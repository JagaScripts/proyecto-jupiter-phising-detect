name: "PR Gatekeeper"

on:
  pull_request:
    branches: ["main", "develop"]
    paths:
      - "services/**"
      - "frontends/**"
      - ".github/workflows/**"

jobs:
  changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      orchestrator: ${{ steps.filter.outputs.orchestrator }}
      knowledge: ${{ steps.filter.outputs.knowledge }}
      reputation: ${{ steps.filter.outputs.reputation }}
      shared: ${{ steps.filter.outputs.shared }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            orchestrator: 'services/srv-orchestrator/**'
            knowledge: 'services/srv-knowledge-rag/**'
            reputation: 'services/CU-03/**'
            shared: 'services/lib-shared-kernel/**'
            frontend: 'frontends/fnd-chatbot/**'

  orchestrator-ci:
    needs: changes
    if: needs.changes.outputs.orchestrator == 'true' || needs.changes.outputs.shared == 'true'
    uses: ./.github/workflows/reusable-python-ci.yml
    with:
      service_name: srv-orchestrator
      working_directory: services/srv-orchestrator

  knowledge-ci:
    needs: changes
    if: needs.changes.outputs.knowledge == 'true' || needs.changes.outputs.shared == 'true'
    uses: ./.github/workflows/reusable-python-ci.yml
    with:
      service_name: srv-knowledge-rag
      working_directory: services/srv-knowledge-rag

  reputation-ci:
    needs: changes
    if: needs.changes.outputs.reputation == 'true' || needs.changes.outputs.shared == 'true'
    uses: ./.github/workflows/reusable-python-ci.yml
    with:
      service_name: srv-reputation
      working_directory: services/CU-03

  shared-ci:
    needs: changes
    if: needs.changes.outputs.shared == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint Shared Kernel
        run: |
          pip install ruff
          ruff check services/lib-shared-kernel

  frontend-ci:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Frontend Docker (Dry Run)
        run: docker build -t fnd-chatbot:test frontends/fnd-chatbot
